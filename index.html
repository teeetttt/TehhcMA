<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TEHHC MA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bgm" loop></audio>

    <div id="volume-controller" class="hidden">
        <div class="vol-row">
            <span>🎵 BGM Volume:</span>
            <input type="range" id="bgm-volume" min="0" max="1" step="0.05" value="0.35" oninput="changeBGMVolume(this.value)">
        </div>
    </div>

    <div id="welcome-overlay" onclick="clickToStartGame()">
        <div class="welcome-content">
            <div class="welcome-icon">🧠</div>
            <h1>TEHHC MA</h1>
            <p>点击屏幕任意处开启</p>
            <span class="pulse-text">CLICK ANYWHERE TO START</span>
        </div>
    </div>

    <div class="container">
        <div class="card">
            
            <div id="menu-screen" class="screen">
                <h1 class="title">Mental Abacus</h1>
                <p class="subtitle">Pls select the mode</p>
                <div class="menu-options">
                    <button class="btn btn-primary" onclick="selectMode('addsub')">加减法</button>
                    <button class="btn btn-primary" onclick="selectMode('mul')">乘法 (×)</button>
                    <button class="btn btn-primary" onclick="selectMode('div')">除法 (÷)</button>
                </div>
            </div>

            <div id="addsub-config-screen" class="screen hidden">
                <h2>加减法设置</h2>
                <div class="form-group">
                    <label>数字位数 (1-5位):</label>
                    <input type="number" id="as-digits" min="1" max="5" value="2">
                </div>
                <div class="form-group">
                    <label>数字行数 (1-12行):</label>
                    <input type="number" id="as-rows" min="1" max="12" value="4">
                </div>
                <div class="form-group">
                    <label>总题数 (1-100题):</label>
                    <input type="number" id="as-total-questions" min="1" max="100" value="10">
                </div>
                <div class="form-group">
                    <label>显示模式:</label>
                    <select id="as-display-type" onchange="toggleDisplayTypeConfig()">
                        <option value="column">直式</option>
                        <option value="flash">闪算 </option>
                    </select>
                </div>
                
                <div id="column-config" class="form-group">
                    <label>单题时间限制 (1-30秒):</label>
                    <input type="number" id="as-column-time" min="1" max="30" value="15">
                </div>
                
                <div id="flash-config" class="form-group hidden">
                    <label>每个号码显示时间 (0.1-5秒):</label>
                    <input type="number" id="as-flash-time" min="0.1" max="5" step="0.1" value="1.0">
                </div>

                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="backToMenu()">返回</button>
                    <button class="btn btn-success" onclick="startAddSubGame()">开始</button>
                </div>
            </div>

            <div id="muldiv-config-screen" class="screen hidden">
                <h2 id="muldiv-title">乘法设置</h2>
                <div class="form-group">
                    <label id="md-label-1">被乘数位数 (1-4位):</label>
                    <input type="number" id="md-digits-1" min="1" max="4" value="2">
                </div>
                <div class="form-group">
                    <label id="md-label-2">乘数位数 (1-3位):</label>
                    <input type="number" id="md-digits-2" min="1" max="3" value="1">
                </div>
                <div class="form-group">
                    <label>总题数 (1-200题):</label>
                    <input type="number" id="md-total-questions" min="1" max="200" value="10">
                </div>
                <p class="info-text">* TIME LIMIT = 15MIN</p>
                
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="backToMenu()">返回</button>
                    <button class="btn btn-success" onclick="startMulDivGame()">开始</button>
                </div>
            </div>

            <div id="game-screen" class="screen hidden">
                <div class="game-header">
                    <span id="question-progress">题目: 1 / 10</span>
                    <span id="game-timer">剩余时间: --</span>
                </div>
                <div id="display-area"></div>
                
                <div id="input-area">
                    <input type="number" id="user-answer" placeholder="请输入答案" autocomplete="off" readonly>
                    <button class="btn btn-success" id="submit-btn" onclick="submitAnswer()">确认 (Enter)</button>
                </div>

                <div id="screen-keyboard">
                    <button class="key-btn" data-val="1">1</button>
                    <button class="key-btn" data-val="2">2</button>
                    <button class="key-btn" data-val="3">3</button>
                    <button class="key-btn" data-val="4">4</button>
                    <button class="key-btn" data-val="5">5</button>
                    <button class="key-btn" data-val="6">6</button>
                    <button class="key-btn" data-val="7">7</button>
                    <button class="key-btn" data-val="8">8</button>
                    <button class="key-btn" data-val="9">9</button>
                    <button class="key-btn" data-val="clear">C</button>
                    <button class="key-btn btn-enter" data-val="enter">Enter</button>
                    <button class="key-btn" data-val="backspace">⌫</button>
                </div>
            </div>

            <div id="result-screen" class="screen hidden">
                <h2>Result</h2>
                <div class="score-board">
                    <p>总题数: <span id="res-total">0</span></p>
                    <p>答对题数: <span id="res-correct" class="text-success">0</span></p>
                    <p>答错题数: <span id="res-wrong" class="text-danger">0</span></p>
                    <p>准确率: <span id="res-accuracy">0%</span></p>
                    <p>总用时: <span id="res-time-spent" style="font-weight: bold; color: #475569;">0秒</span></p>
                </div>

                <div id="wrong-answers-section" class="hidden">
                    <h3>错题 </h3>
                    <div id="wrong-list"></div>
                    <button class="btn btn-warning" id="correction-btn" onclick="startCorrection()">开始订正错题</button>
                </div>

                <div class="btn-group" style="margin-top: 20px;">
                    <button class="btn btn-primary" onclick="backToMenu()">返回主菜单</button>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
